services:
  eduarena:
    image: eduarena:latest
    build:
      context: .
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-3100}:3000"
      - "127.0.0.1:${SOCKET_HOST_PORT:-3101}:3001"
    volumes:
      - ./config:/app/config
    environment:
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:${WEB_HOST_PORT:-3100}}
      SOCKET_URL: ${SOCKET_URL:-http://localhost:${SOCKET_HOST_PORT:-3101}}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8255}
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
